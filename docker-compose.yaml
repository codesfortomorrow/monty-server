version: '3'
services:
  postgres:
    image: postgres:16
    container_name: monty-server-postgres
    restart: unless-stopped
    ports:
      - ${POSTGRES_PORT}:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_VOLUME}:/var/lib/postgresql/data
  redis:
    image: redis/redis-stack-server
    container_name: monty-server-redis
    restart: unless-stopped
    ports:
      - ${REDIS_PORT}:6379
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD}
    volumes:
      - ${REDIS_DATA_VOLUME}:/data
  mongo:
    image: mongo
    container_name: monty-server-mongo
    restart: unless-stopped
    ports:
      - ${MONGO_PORT}:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    command: --wiredTigerCacheSizeGB 0.25
    volumes:
      - ${MONGO_DATA_VOLUME}/db:/data/db
      - ${MONGO_DATA_VOLUME}/configdb:/data/configdb
  monty-server:
    image: monty-server-${APP_ENV}-${NODE_TYPE}
    build:
      context: .
      target: monty-server
      args:
        - PORT:${PORT}
    container_name: monty-server-${APP_ENV}-${NODE_TYPE}
    restart: unless-stopped
    ports:
      - ${PORT}:${PORT}
    # Uncomment this to disable run application on standalone mode
    # depends_on:
    #   - postgres
    #   - redis
    volumes:
      - .env:/monty-server/.env:ro
      - ${STORAGE_DATA_VOLUME}:/monty-server/${STORAGE_DIR}
networks:
  default:
    name: monty-server

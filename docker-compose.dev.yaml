version: '3'
services:
  postgres:
    image: postgres:16
    container_name: monty-server-postgres
    restart: unless-stopped
    ports:
      - ${POSTGRES_PORT}:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: monty-server-pgadmin
    restart: unless-stopped
    ports:
      - ${PGADMIN_PORT}:80
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin:/var/lib/pgadmin
  redis:
    image: redis/redis-stack
    container_name: monty-server-redis
    restart: unless-stopped
    ports:
      - ${REDIS_PORT}:6379
      - ${REDISINSIGHT_PORT}:8001
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD}
    volumes:
      - redis:/data
  mongo:
    image: mongo
    container_name: monty-server-mongo
    restart: unless-stopped
    ports:
      - ${MONGO_PORT}:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    command: --wiredTigerCacheSizeGB 0.25
    volumes:
      - mongo:/data/db
      - mongo-config:/data/configdb
  monty-server:
    image: monty-server-dev
    build:
      context: .
      target: monty-server-dev
      args:
        - PORT:${PORT}
    container_name: monty-server-dev
    restart: unless-stopped
    ports:
      - ${PORT}:${PORT}
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/monty-server/
volumes:
  postgres:
    name: monty-server-postgres
  redis:
    name: monty-server-redis
  mongo:
    name: monty-server-mongo
  mongo-config:
    name: monty-server-mongo-config
  pgadmin:
    name: monty-server-pgadmin
networks:
  default:
    name: monty-server
